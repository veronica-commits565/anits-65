<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Placement Portal</title>
    <link rel="stylesheet" href="Style.css">
    <style>
        /* Modern layouts for the login centering */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 250px);
            padding: 20px 0;
        }
        .login-title {
            color: #0b3d6d;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .card {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }
        .form-group h4 {
            margin: 0 0 8px 0;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .login-btn {
            display: block;
            width: 100%;
            height: 45px;
            background-color: blue;
            color: white;
            font-size: 20px;
            text-align: center;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .login-btn:hover {
            background-color: #0b3d6d;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <img src="C:\Users\soulr\OneDrive\Pictures\anits.jpeg" alt="College Logo" width="80" height="80">
            <div class="title">
                <h1>ANIL NEERUKONDA INSTITUTE OF TECHNOLOGY AND SCIENCES</h1>
                <h2>Campus Placement Portal</h2>
            </div>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="companies.html">Companies</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="login-container">
        <h2 class="login-title"><b>Student Login</b></h2>
        
        <article class="card">
            <form action="details.html" method="get">
                <div class="form-group">
                    <h4>Username</h4>
                    <input type="text" name="student name" required>
                </div>
                
                <div class="form-group">
                    <h4>Password</h4>
                    <input type="password" name="password" required>
                </div>
                
                <br>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </article>
    </main>

    <footer>
        <h3>© 2026 ANITS | Department of Training & Placement</h3>
        <p>Sangivalasa, Visakhapatnam, Andhra Pradesh</p>
    </footer>
</body>
</html>
